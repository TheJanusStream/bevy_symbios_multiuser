[package]
name = "bevy_symbios_multiuser"
version = "0.1.0"
edition = "2024"
authors = ["Janus"]
description = "Multi-user networking for Bevy via ATProto auth with WebRTC p2p messaging."
license = "MIT"
readme = "README.md"
repository = "https://github.com/TheJanusStream/bevy_symbios_multiuser"
keywords = ["networking", "multiplayer"]
categories = ["game-development", "networking"]

[dependencies]
bevy = "0.18"
bevy_matchbox = "0.14"
serde = { version = "1.0", features = ["derive"] }
bincode = "1.3"
serde_json = "1.0"
tracing = "0.1"
thiserror = "2"
matchbox_socket = "0.14"

# Client-side ATProto authentication
reqwest = { version = "0.12", default-features = false, features = ["json", "rustls-tls"], optional = true }

# Relay server dependencies
axum = { version = "0.8", features = ["ws"], optional = true }
tokio = { version = "1", features = ["rt-multi-thread", "macros", "sync"], optional = true }
dashmap = { version = "6", optional = true }
futures-util = { version = "0.3", optional = true }
uuid = { version = "1", features = ["v4", "serde"], optional = true }

[features]
default = ["client"]
client = ["dep:reqwest"]
relay = ["dep:axum", "dep:tokio", "dep:dashmap", "dep:futures-util", "dep:uuid"]

[dev-dependencies]
tokio = { version = "1", features = ["rt-multi-thread", "macros"] }
criterion = { version = "0.6", features = ["html_reports"] }

[[bench]]
name = "message_serialization"
harness = false
